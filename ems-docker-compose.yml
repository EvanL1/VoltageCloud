version: '3.8'

services:
  # Vue 前端应用
  vue-app:
    build: ./ems-vue-frontend
    container_name: ems-vue
    ports:
      - "9000:80"
    environment:
      - VITE_API_URL=http://backend:3000
      - VITE_GRAFANA_URL=http://grafana:3000
      - VITE_WS_URL=ws://backend:3000
    depends_on:
      - backend
      - grafana
    networks:
      - ems-network

  # Grafana 数据可视化
  grafana:
    build: ./ems-grafana
    container_name: ems-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ems-grafana/provisioning:/etc/grafana/provisioning
      - ./ems-grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - influxdb
    networks:
      - ems-network

  # 后端 API 服务
  backend:
    build: ./ems-backend
    container_name: ems-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AWS_REGION=us-east-1
      - IOT_ENDPOINT=${IOT_ENDPOINT}
      - TIMESTREAM_DB=iot-demo-timestream-db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-secret-key
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    depends_on:
      - redis
      - prometheus
    networks:
      - ems-network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: ems-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ems-network

  # InfluxDB 时序数据库
  influxdb:
    image: influxdb:2.7
    container_name: ems-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=ems
      - DOCKER_INFLUXDB_INIT_BUCKET=energy
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - ems-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ems-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ems-network

  # Nginx 反向代理（生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: ems-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - vue-app
      - backend
      - grafana
    networks:
      - ems-network
    profiles:
      - production

volumes:
  grafana-data:
  prometheus-data:
  influxdb-data:
  influxdb-config:
  redis-data:

networks:
  ems-network:
    driver: bridge